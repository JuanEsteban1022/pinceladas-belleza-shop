<section class="page productos">
  <h2 class="page__title">Productos</h2>

  <!-- Filtros -->
  <div class="filtros-container">
    <!-- Filtro por categorías -->
    <div class="filtro-categorias">
      <label for="categoria-select" class="filtro__label">Filtrar por categoría:</label>
      <select id="categoria-select" class="filtro__select" [value]="categoriaSeleccionada?.toString() ?? ''"
        (change)="onCategoriaChange($event)">
        <option value="">Todas las categorías</option>
        <option *ngFor="let categoria of categorias" [value]="categoria.id">
          {{ categoria.nombreCategoria }}
        </option>
      </select>
    </div>

    <!-- Buscador -->
    <div class="filtro-buscador">
      <label for="buscador" class="buscador__label">Buscar producto:</label>
      <div class="buscador__input-container">
        <input type="text" id="buscador" class="buscador__input" placeholder="Escribe el nombre del producto..."
          [(ngModel)]="terminoBusqueda" (input)="filtrarProductos()" autocomplete="off">
        <div class="buscador__icon" *ngIf="!terminoBusqueda">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="loading-container">
    <div class="loading-spinner"></div>
    <p class="loading-text">Cargando productos...</p>
  </div>
  <p *ngIf="error" class="page__error">{{ error }}</p>

  <p class="page__subtitle" *ngIf="!loading && !error && productosFiltrados.length === 0">
    No hay productos para mostrar.
  </p>

  <div class="productos__grid" *ngIf="!loading && !error && productosFiltrados.length > 0">
    <article class="producto-card" *ngFor="let p of productosFiltrados" [routerLink]="['/producto', p.id]">
      <div class="producto-card__image">
        <img [src]="p.urlDrive ? p.urlDrive.split(',')[0].trim() : 'assets/img_no_found.png'" [alt]="p.nombre">
      </div>
      <h3 class="producto-card__name">{{ p.nombre }}</h3>
      <!-- <p class="producto-card__description">{{ p.descripcion }}</p> -->
      <p class="producto-card__price">
        {{ p.precio | currency:'COP':'symbol':'1.0-0' }}
      </p>
      <div class="producto-card__actions">
        <input type="number" class="producto-card__quantity" [(ngModel)]="p.cantidad" min="1"
          max="{{ p.cantidadStock || 99 }}" value="1" (click)="$event.stopPropagation()" />
        <button class="producto-card__button" (click)="addToCart(p); $event.stopPropagation()">
          Añadir al carrito
        </button>
      </div>
    </article>
  </div>
</section>
